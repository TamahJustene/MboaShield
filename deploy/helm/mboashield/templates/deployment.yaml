apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mboashield.fullname" . }}-api
  labels:
    {{- include "mboashield.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mboashield.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "mboashield.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              value: {{ .Values.databaseUrl | quote }}
            - name: REDIS_URL
              value: {{ .Values.redisUrl | quote }}
            - name: CELERY_BROKER_URL
              value: {{ .Values.celeryBrokerUrl | quote }}
            - name: CELERY_RESULT_BACKEND
              value: {{ .Values.celeryResultBackend | quote }}
            - name: JWT_SECRET
              value: {{ .Values.jwtSecret | quote }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
