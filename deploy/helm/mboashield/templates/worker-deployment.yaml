{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mboashield.fullname" . }}-worker
  labels:
    {{- include "mboashield.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "mboashield.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "mboashield.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery", "-A", "backend.app.workers.celery_app.celery_app", "worker", "--loglevel=info"]
          env:
            - name: DATABASE_URL
              value: {{ .Values.databaseUrl | quote }}
            - name: REDIS_URL
              value: {{ .Values.redisUrl | quote }}
            - name: CELERY_BROKER_URL
              value: {{ .Values.celeryBrokerUrl | quote }}
            - name: CELERY_RESULT_BACKEND
              value: {{ .Values.celeryResultBackend | quote }}
            - name: WORKERS_ENABLED
              value: "true"
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
