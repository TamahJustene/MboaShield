<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b3d2e" />
  <title>MboaShield - Verified Announcements</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <p class="eyebrow">Phase 11</p>
      <h1>Verified announcements</h1>
      <p class="tagline">Draft, publish signed advisories, QR verify, version history</p>
    </div>
    <div class="header-actions">
      <a href="/static/verify-announcement.html" class="btn-ghost history-link">Public verify</a>
      <a href="/static/institution-portal.html" class="btn-ghost history-link">Portal</a>
      <a href="/" class="btn-ghost history-link">Home</a>
    </div>
  </header>

  <section class="history-panel">
    <h2>Publish advisory</h2>
    <form id="publishForm" class="profile-form">
      <label class="report-label" for="institutionId">Institution ID</label>
      <input id="institutionId" type="text" list="institutionOptions" required />
      <datalist id="institutionOptions"></datalist>
      <label class="report-label" for="title">Title</label>
      <input id="title" type="text" required />
      <label class="report-label" for="body">Body</label>
      <textarea id="body" rows="5" required></textarea>
      <button type="submit" class="btn-primary">Create draft &amp; publish</button>
      <p id="publishStatus" class="demo-status muted" aria-live="polite"></p>
    </form>
    <div id="publishResult" class="out history-detail empty-detail"></div>
  </section>

  <section class="history-panel">
    <h2>Recent announcements</h2>
    <div id="announcementList" class="history-list"></div>
  </section>

  <script src="/static/announcements.js"></script>
</body>
</html>
