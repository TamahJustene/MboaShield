<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b3d2e" />
  <title>MboaShield - Analyst Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div
    id="portal-shell"
    data-portal="analyst"
    data-eyebrow="MboaShield 2030 · T3"
    data-title="Analyst console"
    data-tagline="National incident queue, workflow transitions, and timeline audit"
  ></div>

  <section class="history-panel history-certificates">
    <h2>Queue summary</h2>
    <div id="analystSummary" class="stat-strip" aria-live="polite">Loading summary...</div>
    <ol id="workflowPipeline" class="workflow-pipeline" aria-label="National workflow"></ol>
  </section>

  <div class="history-layout gov-layout">
    <section class="history-panel">
      <div class="panel-heading-row">
        <h2>Active queue</h2>
        <button type="button" id="refreshAnalyst" class="btn-ghost">Refresh</button>
      </div>
      <p id="queueLead" class="summary-lead">Loading analyst queue...</p>
      <div id="queueList" class="history-list"></div>
    </section>
    <section class="history-panel">
      <h2>Case workspace</h2>
      <div id="caseDetail" class="out history-detail empty-detail">
        <p class="report-copy">Select an incident to review evidence and advance the national workflow.</p>
      </div>
      <div id="caseTimeline" class="timeline-block"></div>
    </section>
  </div>

  <footer class="app-footer">
    <p>MboaShield Tech - tamahjustene45@gmail.com</p>
  </footer>
  <script src="/static/portal-shell.js"></script>
  <script src="/static/analyst.js"></script>
</body>
</html>
