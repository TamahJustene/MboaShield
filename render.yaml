# Render Blueprint - connect repo at https://dashboard.render.com
# New > Blueprint > link github.com/TamahJustene/MboaShield
services:
  - type: web
    name: mboashield
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: MBOASHIELD_ENV
        value: production
      - key: AUTH_ENFORCE
        value: "false"
      - key: DEPLOYMENT_PROFILE
        value: demo
      - key: JWT_SECRET
        generateValue: true
      - key: RATE_LIMIT_PER_MINUTE
        value: "180"
      # Attach a Render Postgres and set DATABASE_URL for durable production data:
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: mboashield-db
      #     property: connectionString
