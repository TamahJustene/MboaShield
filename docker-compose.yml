services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mboashield
      POSTGRES_USER: mboashield
      POSTGRES_PASSWORD: mboashield
    ports:
      - "5432:5432"
    volumes:
      - mboashield_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mboashield -d mboashield"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://mboashield:mboashield@db:5432/mboashield
      JWT_SECRET: change-me-in-production-mboashield
      MBOASHIELD_ENV: docker
      AUTH_ENFORCE: "false"
      CORS_ORIGINS: "*"
      RATE_LIMIT_PER_MINUTE: "300"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mboashield_pg:
